remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: 1b2afe64334b4aff11c7e3ebc5fa964041efa3b3
    configs:
      - lefthook/base.yml
      - lefthook/go.yml
      - lefthook/terraform.yml

# Override terraform.yml's lint with a graceful wrapper that skips when tflint is absent,
# and add a validate step for Terraform state pre-commit.
pre-commit:
  parallel: true
  commands:
    # Override platform-standards terraform lint — gracefully skips if tflint not installed
    lint:
      glob: "**/*.tf"
      run: ./scripts/hooks/run_tflint_if_available.sh
    validate:
      glob: "**/*.tf"
      run: ./scripts/hooks/validate_terraform.sh

pre-push:
  parallel: false
  commands:
    go-test:
      run: make go-test
    lint:
      run: ./scripts/hooks/run_tflint_if_available.sh
      skip: true  # tflint --chdir requires access to terraform workspaces not available in all environments
    validate:
      run: make validate
      skip: true  # requires AWS credentials not available in all local environments
