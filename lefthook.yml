remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: 1b2afe64334b4aff11c7e3ebc5fa964041efa3b3
    configs:
      - lefthook/base.yml
      - lefthook/go.yml

# terraform hooks use repo-specific scripts (tflint wrapper + validate helper)
# local lint overrides go.yml's make lint for terraform context
pre-commit:
  commands:
    lint:
      glob: "**/*.tf"
      run: ./scripts/hooks/run_tflint_if_available.sh
    validate:
      glob: "**/*.tf"
      run: ./scripts/hooks/validate_terraform.sh

pre-push:
  parallel: false
  commands:
    go-test:
      run: make go-test
    lint:
      run: ./scripts/hooks/run_tflint_if_available.sh
    validate:
      run: make validate
      skip: true  # requires AWS credentials not available in all local environments
