name: Terraform Plan

# Manual-only Terraform plan workflow.
# No automatic PR execution.

on:
  workflow_dispatch:

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan-prod:
    permissions:
      id-token: write        # Required for OIDC token exchange
      contents: read
      pull-requests: write   # Required to post plan comment
    uses: ffreis-org/ffreis-workflows-terraform/.github/workflows/tf-plan.yml@105d9d036a68d89d47b6efe97d760849b99ec80b
    with:
      environment: "prod"
      chdir: "terraform/stack"
    secrets: inherit
